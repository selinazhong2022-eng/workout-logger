<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>训练记录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #0f0f0f; color: #f0f0f0; font-family: -apple-system, sans-serif; min-height: 100vh; padding: 20px 16px 100px; }
h1 { font-size: 16px; font-weight: 500; color: #c8f060; margin-bottom: 4px; }
.date { font-size: 12px; color: #666; margin-bottom: 24px; }
.slabel { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
.parts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
.part-btn { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 6px; color: #666; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.15s; font-family: inherit; }
.part-btn .ic { font-size: 20px; }
.part-btn.active { background: #1a2200; border-color: #c8f060; color: #c8f060; font-weight: 600; }
.ex-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.ex-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 14px; transition: all 0.15s; }
.ex-item.sel { border-color: #c8f060; background: #1a2200; color: #c8f060; }
.sets-wrap { margin-bottom: 16px; }
.set-row { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.set-n { font-size: 11px; color: #555; min-width: 22px; }
.set-fields { display: flex; gap: 8px; flex: 1; }
.sf { flex: 1; }
.sf label { display: block; font-size: 9px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.sf input { background: #222; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #f0f0f0; font-size: 16px; width: 100%; text-align: center; -webkit-appearance: none; font-family: inherit; }
.sf input:focus { outline: none; border-color: #c8f060; }
.sf input::placeholder { color: #444; }
.del-btn { background: none; border: none; color: #444; font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }
.add-btn { width: 100%; background: none; border: 1px dashed #333; border-radius: 10px; padding: 12px; color: #555; font-size: 13px; cursor: pointer; margin-bottom: 24px; font-family: inherit; }
.last { background: #1a1a1a; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #666; margin-bottom: 16px; display: none; }
.submit { width: 100%; background: #c8f060; border: none; border-radius: 14px; padding: 18px; color: #0f0f0f; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.submit:disabled { background: #2a2a2a; color: #444; }
.msg { text-align: center; font-size: 13px; padding: 12px 0; min-height: 20px; color: #666; }
.msg.ok { color: #4ade80; }
.msg.err { color: #ff5555; }
.info { font-size: 11px; color: #444; text-align: center; padding: 6px 0; }
.hidden { display: none; }
</style>
</head>
<body>

<h1>💪 训练记录</h1>
<div class="date" id="dateEl"></div>

<div class="slabel">今天练什么</div>
<div class="parts">
  <button class="part-btn" data-part="Shoulder" data-db="3344f225-9637-80ff-84e0-000b79dcac7a" data-key="Shoulder_Exercise" onclick="selPart(this)">
    <span class="ic">🏋️</span>肩
  </button>
  <button class="part-btn" data-part="Back" data-db="32f4f225-9637-8028-a69a-000bfa497766" data-key="Back_Exercise" onclick="selPart(this)">
    <span class="ic">🔙</span>背
  </button>
  <button class="part-btn" data-part="Chest" data-db="3344f225-9637-8091-9655-000bde0227ec" data-key="Chest_Exercise" onclick="selPart(this)">
    <span class="ic">💪</span>胸
  </button>
  <button class="part-btn" data-part="Glute" data-db="3344f225-9637-800f-89cd-000b610cba48" data-key="Glute_Exercise" onclick="selPart(this)">
    <span class="ic">🍑</span>臀
  </button>
  <button class="part-btn" data-part="Arm" data-db="33c4f225-9637-80da-936a-000bb52efc76" data-key="Arm exercise" onclick="selPart(this)">
    <span class="ic">💪</span>手臂
  </button>
</div>

<div id="exSec" class="hidden">
  <div class="slabel">选动作</div>
  <div class="ex-list" id="exList"></div>
</div>

<div id="setsSec" class="hidden">
  <div class="slabel">记录组数</div>
  <div class="last" id="lastRec"></div>
  <div class="sets-wrap" id="setsWrap"></div>
  <button class="add-btn" onclick="addSet()">＋ 加一组</button>
  <button class="submit" id="subBtn" onclick="submitAll()" disabled>写入 Notion</button>
  <div class="msg" id="msg"></div>
  <div class="info" id="dbgInfo"></div>
</div>

<script>
const TOKEN = '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';
const STRE = '2f04f225-9637-8037-a8ac-000bc1cd597e';
const VER = '2022-06-28';

let part = null, partKey = null, exs = [], sets = [];
const today = new Date().toISOString().split('T')[0];
document.getElementById('dateEl').textContent = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'});

async function api(path, body) {
  const r = await fetch('https://api.notion.com' + path, {
    method: 'POST',
    headers: {'Authorization':'Bearer '+TOKEN,'Notion-Version':VER,'Content-Type':'application/json'},
    body: JSON.stringify(body || {})
  });
  return r.json();
}

async function selPart(btn) {
  document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  part = btn.dataset.part;
  partKey = btn.dataset.key;
  exs = []; sets = [];
  document.getElementById('exSec').classList.remove('hidden');
  document.getElementById('setsSec').classList.add('hidden');
  document.getElementById('subBtn').disabled = true;
  const el = document.getElementById('exList');
  el.innerHTML = '<div style="color:#555;padding:8px 0;font-size:13px;">加载中…</div>';
  document.getElementById('dbgInfo').textContent = '';
  try {
    const d = await api('/v1/databases/' + btn.dataset.db + '/query', {page_size:50});
    if (d.object === 'error') {
      el.innerHTML = '<div style="color:#ff5555;font-size:13px;">错误: ' + d.message + '</div>';
      document.getElementById('dbgInfo').textContent = 'code: ' + d.code;
      return;
    }
    el.innerHTML = '';
    if (!d.results?.length) { el.innerHTML = '<div style="color:#555;font-size:13px;">没有动作</div>'; return; }
    d.results.forEach(r => {
      const tp = Object.values(r.properties).find(p => p.type==='title');
      const name = tp?.title?.map(t=>t.plain_text).join('') || '未命名';
      const item = document.createElement('div');
      item.className = 'ex-item';
      item.dataset.id = r.id;
      item.dataset.name = name;
      item.innerHTML = '<span>' + name + '</span><span style="font-size:18px;color:#444">○</span>';
      item.onclick = () => togEx(item);
      el.appendChild(item);
    });
  } catch(e) {
    el.innerHTML = '<div style="color:#ff5555;font-size:13px;">请求失败: ' + e.message + '</div>';
  }
}

function togEx(el) {
  const id = el.dataset.id, name = el.dataset.name;
  const i = exs.findIndex(e => e.id === id);
  if (i >= 0) { exs.splice(i,1); el.classList.remove('sel'); el.querySelector('span:last-child').textContent = '○'; }
  else { exs.push({id,name}); el.classList.add('sel'); el.querySelector('span:last-child').textContent = '●'; }
  if (exs.length > 0) {
    document.getElementById('setsSec').classList.remove('hidden');
    if (sets.length === 0) addSet();
    fetchLast();
  } else {
    document.getElementById('setsSec').classList.add('hidden');
  }
  updSubmit();
}

async function fetchLast() {
  try {
    const d = await api('/v1/databases/'+STRE+'/query', {
      filter:{property:'Body part',multi_select:{contains:part}},
      sorts:[{property:'Date',direction:'descending'}],
      page_size:1
    });
    const rec = d.results?.[0];
    const el = document.getElementById('lastRec');
    if (!rec) { el.style.display='none'; return; }
    const p = rec.properties;
    const w=p.Weight?.number, s=p.Sets?.number, rp=p.Reps?.number, dt=p.Date?.date?.start;
    if (w||s||rp) { el.style.display='block'; el.textContent='上次 ('+(dt||'?')+'): '+(s||'?')+' 组 × '+(rp||'?')+' 次 @ '+(w||'?')+' kg'; }
  } catch(e) {}
}

function addSet() {
  const last = sets[sets.length-1];
  const s = {weight:last?.weight||'', reps:last?.reps||''};
  sets.push(s);
  const i = sets.length-1;
  const row = document.createElement('div');
  row.className = 'set-row';
  row.innerHTML =
    '<span class="set-n">S'+(i+1)+'</span>'+
    '<div class="set-fields">'+
      '<div class="sf"><label>重量 kg</label><input type="number" inputmode="decimal" placeholder="'+(last?.weight||'0')+'" value="'+s.weight+'" oninput="upd('+i+',\'weight\',this.value)"></div>'+
      '<div class="sf"><label>次数</label><input type="number" inputmode="numeric" placeholder="'+(last?.reps||'0')+'" value="'+s.reps+'" oninput="upd('+i+',\'reps\',this.value)"></div>'+
    '</div>'+
    '<button class="del-btn" onclick="delRow('+i+',this.parentElement)">×</button>';
  document.getElementById('setsWrap').appendChild(row);
  setTimeout(()=>row.querySelector('input').focus(), 80);
}

function upd(i,f,v) { if(sets[i]) sets[i][f]=v; updSubmit(); }
function delRow(i,row) {
  sets.splice(i,1); row.remove();
  document.querySelectorAll('.set-row').forEach((r,idx)=>r.querySelector('.set-n').textContent='S'+(idx+1));
  updSubmit();
}
function updSubmit() {
  document.getElementById('subBtn').disabled = !(exs.length>0 && sets.some(s=>s.weight||s.reps));
}
function setMsg(t,c) { const e=document.getElementById('msg'); e.textContent=t; e.className='msg '+(c||''); }

async function submitAll() {
  const btn = document.getElementById('subBtn');
  btn.disabled = true;
  setMsg('写入中…');
  const rels = exs.map(e=>({id:e.id}));
  let ok=0, fail=0;
  for (let i=0; i<sets.length; i++) {
    const s = sets[i];
    if (!s.weight && !s.reps) continue;
    const props = {
      'Session id':{title:[{text:{content:part+' S'+(i+1)+' '+today}}]},
      'Date':{date:{start:today}},
      'Body part':{multi_select:[{name:part}]},
      'Sets':{number:1}
    };
    if (s.weight) props['Weight']={number:parseFloat(s.weight)};
    if (s.reps) props['Reps']={number:parseInt(s.reps)};
    if (rels.length) props[partKey]={relation:rels};
    try {
      const res = await api('/v1/pages', {parent:{database_id:STRE}, properties:props});
      res.object==='error' ? (fail++, document.getElementById('dbgInfo').textContent=res.message) : ok++;
    } catch(e) { fail++; }
  }
  if (fail===0) {
    setMsg('✓ '+ok+' 组已写入 Notion','ok');
    sets=[]; document.getElementById('setsWrap').innerHTML='';
    document.querySelectorAll('.ex-item').forEach(el=>{el.classList.remove('sel');el.querySelector('span:last-child').textContent='○';});
    exs=[]; document.getElementById('setsSec').classList.add('hidden');
    document.getElementById('lastRec').style.display='none';
  } else {
    setMsg('写入失败 '+fail+' 组','err');
    btn.disabled=false;
  }
}
</script>
</body>
</html>
